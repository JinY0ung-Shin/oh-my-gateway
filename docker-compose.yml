services:
  gateway:
    build:
      context: .
      # Inherit proxy settings from the host shell at build time.
      # Listed without values so Compose reads them from the host environment;
      # unset ones are simply not forwarded. HTTP_PROXY / HTTPS_PROXY / NO_PROXY
      # (and lowercase) are predefined build ARGs in Docker — no Dockerfile ARG
      # declaration needed, and they are not persisted in image history.
      args:
        - HTTP_PROXY
        - HTTPS_PROXY
        - NO_PROXY
        - http_proxy
        - https_proxy
        - no_proxy
        # Optional apt/npm/pip overrides for private/corporate mirrors.
        # Export these in the shell before 'docker compose build' on corp networks.
        - APT_MIRROR_URL
        - APT_SECURITY_MIRROR_URL
        - NPM_CONFIG_REGISTRY
        - OPENCODE_VERSION
        - PIP_INDEX_URL
        - PIP_EXTRA_INDEX_URL
        - PIP_TRUSTED_HOST
    # Wait for the optional gateway-log MySQL sidecar to pass its healthcheck
    # before starting the gateway, so the usage-log engine can connect on first
    # try.  ``required: false`` (Compose v2.20+) keeps the gateway runnable
    # when the ``logging`` profile is off and gateway-log isn't created.
    depends_on:
      gateway-log:
        condition: service_healthy
        required: false
    # ${PORT} is interpolated by Compose at parse-time from the shell env and
    # the ./.env file next to this compose file. It is NOT read from the service's
    # env_file. If you move PORT into a non-default env file, pin the host side
    # explicitly (e.g. "8000:${PORT}") instead of relying on auto-interpolation.
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ~/.claude:/root/.claude
      # Persist admin overrides (system prompt, runtime config) across restarts
      - ./data:/app/data
      # Claude working directory (shared with host for inspection/editing).
      # Host path comes from CLAUDE_CWD in .env (parse-time interpolation);
      # falls back to ./working_dir. Container path stays fixed so the
      # CLAUDE_CWD override below is always valid.
      - ${CLAUDE_CWD:-./working_dir}:/app/working_dir
      # Optional: Mount a specific workspace directory
      # - ./workspace:/workspace
    # All runtime configuration comes from .env (see .env.example for the full list).
    env_file:
      - .env
    environment:
      # Fail fast if ADMIN_API_KEY is missing — the server refuses to start without it.
      - ADMIN_API_KEY=${ADMIN_API_KEY:?Set ADMIN_API_KEY in .env}
      # Override .env CLAUDE_CWD (host path) with the in-container mount target.
      - CLAUDE_CWD=/app/working_dir

  # Optional MySQL sidecar that persists per-turn usage logs (token counts,
  # tool-call stats).  Activated only when the `logging` compose profile is
  # enabled (e.g. `docker compose --profile logging up`).  When the profile
  # is off the gateway runs standalone and no MySQL image is pulled.
  gateway-log:
    profiles: ["logging"]
    image: mysql:8.0
    container_name: gateway-log
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${GATEWAY_LOG_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${GATEWAY_LOG_MYSQL_ROOT_PASSWORD:-gateway_root}
      MYSQL_DATABASE: ${GATEWAY_LOG_MYSQL_DATABASE:-gateway_log}
      MYSQL_USER: ${GATEWAY_LOG_MYSQL_USER:-gateway}
      MYSQL_PASSWORD: ${GATEWAY_LOG_MYSQL_PASSWORD:-gateway}
    volumes:
      - ./data/mysql_data:/var/lib/mysql
      - ./docker/mysql_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${GATEWAY_LOG_MYSQL_ROOT_PASSWORD:-gateway_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
