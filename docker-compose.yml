services:
  claude-wrapper:
    build: .
    # ${PORT} is interpolated by Compose at parse-time from the shell env and
    # the ./.env file next to this compose file. It is NOT read from the service's
    # env_file. If you move PORT into a non-default env file, pin the host side
    # explicitly (e.g. "8000:${PORT}") instead of relying on auto-interpolation.
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ~/.claude:/root/.claude
      # Persist admin overrides (system prompt, runtime config) across restarts
      - ./data:/app/data
      # Claude working directory (shared with host for inspection/editing)
      - ./working_dir:/app/working_dir
      # Optional: Mount a specific workspace directory
      # - ./workspace:/workspace
    # All runtime configuration comes from .env (see .env.example for the full list).
    env_file:
      - .env
    environment:
      # Fail fast if ADMIN_API_KEY is missing — the server refuses to start without it.
      - ADMIN_API_KEY=${ADMIN_API_KEY:?Set ADMIN_API_KEY in .env}
      # Override .env CLAUDE_CWD (host path) with the in-container mount target.
      - CLAUDE_CWD=/app/working_dir
